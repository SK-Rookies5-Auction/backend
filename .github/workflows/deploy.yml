name: Backend Deploy

on:
  push:
    branches:
      - main
      - ci/cd
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  BACKEND_IMAGE_PARAM: /rookies5-macta/dev/infra/BACKEND_IMAGE
  DB_URL: ${{ secrets.DB_URL }}
  DB_USERNAME: ${{ secrets.DB_USERNAME }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

jobs:
  deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker Build & Push
        id: build-image
        env:
          ECR: ${{ secrets.ECR_BACKEND_URI }}
          TAG: ${{ github.sha }}
        run: |
          IMAGE="$ECR:$TAG"
          docker build \
            -t "$IMAGE" \
            -t "$ECR:latest" \
            .
          docker push "$IMAGE"
          docker push "$ECR:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Update Backend Image in SSM
        run: |
          aws ssm put-parameter \
            --region "${{ env.AWS_REGION }}" \
            --name "${{ env.BACKEND_IMAGE_PARAM }}" \
            --type SecureString \
            --value "${{ steps.build-image.outputs.image }}" \
            --overwrite

      - name: Checkout Infra Repository
        uses: actions/checkout@v4
        with:
          repository: SK-Rookies5-Auction/infra
          token: ${{ secrets.ARGOCD_GIT_TOKEN }}
          path: infra-repo

      - name: Update k8s
        run: |
          cd infra-repo
          sed -i "s|image: .*|image: ${{ steps.build-image.outputs.image }}|g" k8s/backend/backend.yaml

      - name: Commit and Push Changes
        run: |
          cd infra-repo
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add k8s/backend/backend.yaml

          if ! git diff --cached --quiet; then
            git commit -m "chore: update backend image to ${{ github.sha }} [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ env.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Apply Backend Runtime Secret
        run: |
          kubectl create secret generic backend-secret \
            --from-literal=DB_URL="${DB_URL}" \
            --from-literal=DB_USERNAME="${DB_USERNAME}" \
            --from-literal=DB_PASSWORD="${DB_PASSWORD}" \
            --from-literal=JWT_SECRET="${JWT_SECRET}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply ArgoCD Application
        run: |
          kubectl apply -f infra-repo/argocd/backend-application.yml
